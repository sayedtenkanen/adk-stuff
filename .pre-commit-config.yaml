repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: coverage
        name: coverage
        entry: uv run pytest --cov --cov-fail-under=100 --no-header -q
        language: system
        types: [python]
        pass_filenames: false

      - id: secrets
        name: secrets
        entry: .pre-commit-hooks/check-secrets.sh
        language: script
        pass_filenames: false
