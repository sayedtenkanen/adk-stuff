name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check

      - name: pytest with coverage
        run: uv run pytest --cov --cov-fail-under=100 --no-header -q

      - name: bandit
        run: uv run bandit -c pyproject.toml -r src

      - name: pip-audit
        run: uv run pip-audit --strict --ignore-vuln PYSEC-2026-161
